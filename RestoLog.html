<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1552566626-52f8b828add9') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    .login-box {
      background: rgba(0, 0, 0, 0.8);
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0px 5px 25px rgba(255,0,0,0.4);
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: #ff4d4d;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      background: #ff4d4d;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover {
      background: #cc0000;
    }
    .error {
      margin-top: 10px;
      color: #ff8080;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Restaurant Login</h2>
    <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
     <p>Don't have an account? <button type="submit1">Register here</a></p>
    <p id="loginError" class="error"></p>
    <p class="error" id="error"></p>
  </div>

document.getElementById('loginForm')?.addEventListener('submit', (e) => {

    const password = document.getElementById('loginPassword').value;

   signInWithEmailAndPassword(auth,email, password)
        .then(() => {
            window.location.href = "SelectAct.html";
        })
        .catch((error) => {
            document.getElementById('loginError').innerText = error.message;
        });
});

document.getElementById('loginForm')?.addEventListener('submit1', (e) => {

            window.alert("register successfull")
            window.location.href = "SelectAct.html";

</script>
</body>
</html>
