<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Reservations</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 0;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      background: #cc0000;
      color: #fff;
      padding: 15px;
      width: 100%;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0px 3px 8px rgba(0,0,0,0.3);
    }
    .container {
      margin-top: 30px;
      width: 90%;
      max-width: 800px;
      background: #fff;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
    }
    h2 {
      margin-bottom: 20px;
      color: #cc0000;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    table th, table td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
    table th {
      background: #f4f4f4;
    }
    .no-reservation {
      text-align: center;
      font-size: 18px;
      padding: 20px;
      color: #666;
    }
    .book-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #cc0000;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .book-btn:hover {
      background: #a60000;
    }
  </style>
</head>
<body>
  <header>My Reservations</header>

  <div class="container">
    <h2>Your Bookings</h2>
    <div id="reservationContainer"></div>
    <div style="text-align: center;">
      <a href="TableBooking.html" class="book-btn">Book a Table</a>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCyA2J8LvC5g7AytMe-Z9JpTQXCawa7Fao",
  authDomain: "dinebridge-c997d.firebaseapp.com",
  projectId: "dinebridge-c997d",
  storageBucket: "dinebridge-c997d.appspot.com",
  messagingSenderId: "36472278990",
  appId: "1:36472278990:web:6c407e4e9bac73fd7ea59f",
  measurementId: "G-TJVBF3Y8CK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const reservationContainer = document.getElementById("reservationContainer");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const q = query(collection(db, "bookings"), where("userId", "==", user.uid));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          reservationContainer.innerHTML = `<div class="no-reservation">No reservation till yet.</div>`;
        } else {
          let tableHTML = `
            <table>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>People</th>
                <th>Table</th>
              </tr>
          `;

          querySnapshot.forEach((doc) => {
            const data = doc.data();
            tableHTML += `
              <tr>
                <td>${data.date}</td>
                <td>${data.timeSlot}</td>
                <td>${data.people}</td>
                <td>${data.tableId}</td>
              </tr>
            `;
          });

          tableHTML += "</table>";
          reservationContainer.innerHTML = tableHTML;
        }
      } else {
        reservationContainer.innerHTML = `<div class="no-reservation">Please log in to view your reservations.</div>`;
      }
    });
  </script>
</body>
</html>
