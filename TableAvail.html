<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager - Table Availability</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #cc0000;
      margin-bottom: 20px;
    }

    .form-container {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: 0 auto 30px auto;
    }

    .form-container input,
    .form-container select,
    .form-container button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .form-container button {
      background: #cc0000;
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .form-container button:hover {
      background: #a00000;
    }

    .table-list {
      max-width: 800px;
      margin: auto;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table th, table td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    table th {
      background: #f2f2f2;
      color: #333;
    }

    .status-available {
      color: green;
      font-weight: 600;
    }
    .status-unavailable {
      color: red;
      font-weight: 600;
    }

    .action-btn {
      background: #ff4d4d;
      border: none;
      padding: 6px 10px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .action-btn:hover {
      background: #cc0000;
    }
  </style>
</head>
<body>
  <h1>Manage Table Availability</h1>

  <!-- Add/Update Table Form -->
  <div class="form-container">
    <h3>Add / Update Table</h3>
    <input type="text" id="tableId" placeholder="Table ID (e.g., T1)">
    <input type="number" id="capacity" placeholder="Capacity (e.g., 4)">
    <select id="status">
      <option value="available">Available</option>
      <option value="unavailable">Unavailable</option>
    </select>
    <button id="saveTable">Save Table</button>
  </div>

  <!-- Table List -->
  <div class="table-list">
    <h3>All Tables</h3>
    <table>
      <thead>
        <tr>
          <th>Table ID</th>
          <th>Capacity</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableData">
        <!-- Filled dynamically -->
      </tbody>
    </table>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, setDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCyA2J8LvC5g7AytMe-Z9JpTQXCawa7Fao",
      authDomain: "dinebridge-c997d.firebaseapp.com",
      projectId: "dinebridge-c997d",
      storageBucket: "dinebridge-c997d.appspot.com",
      messagingSenderId: "36472278990",
      appId: "1:36472278990:web:6c407e4e9bac73fd7ea59f",
      measurementId: "G-TJVBF3Y8CK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const saveBtn = document.getElementById("saveTable");
    const tableBody = document.getElementById("tableData");

    // Save or Update Table
    saveBtn.addEventListener("click", async () => {
      const tableId = document.getElementById("tableId").value.trim();
      const capacity = document.getElementById("capacity").value;
      const status = document.getElementById("status").value;

      if (!tableId || !capacity) {
        alert("Please enter table details");
        return;
      }

      await setDoc(doc(db, "tables", tableId), {
        tableId,
        capacity: parseInt(capacity),
        status
      });

      loadTables();
      document.getElementById("tableId").value = "";
      document.getElementById("capacity").value = "";
    });

    // Load Tables
    async function loadTables() {
      tableBody.innerHTML = "";
      const snapshot = await getDocs(collection(db, "tables"));
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${data.tableId}</td>
          <td>${data.capacity}</td>
          <td class="${data.status === 'available' ? 'status-available' : 'status-unavailable'}">${data.status}</td>
          <td>
            <button class="action-btn" onclick="deleteTable('${docSnap.id}')">Delete</button>
          </td>
        `;
        tableBody.appendChild(row);
      });
    }

    // Delete Table
    window.deleteTable = async (id) => {
      await deleteDoc(doc(db, "tables", id));
      loadTables();
    };

    // Load tables initially
    loadTables();
  </script>
</body>
</html>
