<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restaurant Table Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff6b35, #ff914d);
      color: #333;
    }

    header {
      background: #fff;
      padding: 20px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      color: #ff6b35;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #444;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }

    select, input[type="submit"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 1rem;
    }

    input[type="submit"] {
      background: #38cb82;
      color: #fff;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    input[type="submit"]:hover {
      background: #198450;
    }

    #dateCards {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      overflow-x: auto;
    }

    #dateCards div {
      flex: 0 0 auto;
      background: #f8f8f8;
      padding: 10px 15px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    #dateCards div.selected {
      background: #ff6b35;
      color: white;
      font-weight: bold;
    }

    .floor-plan {
     margin-left: 35%;
     align-self: center;
     display: grid;
     grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
     gap: 9px;
    }

    .area-title {
      font-weight: 600;
      margin-bottom: 10px;
      text-align: center;
      
    }

    .table-grid-inside {
      display: grid;
      grid-area: inside;
      background-color: darkturquoise;
      margin-top: 0%;
    }


    .table {
      padding: 20px;
      margin: 5px;
      border-radius: 12px;
      background: #eee;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      
    }

    .table:hover {
      background: #ddd;
    }

    .table.selected {
      background: #4caf50;
      color: white;
    }

    .table.reserved {
      background: #d9534f;
      color: white;
      cursor: not-allowed;
    }

    .confirmation {
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #28a745;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Restaurant Table Booking</h1>
</header>

<div class="container">
  <form id="bookingForm">
    <h2>Book a Table</h2>

    <label>Select Reservation Date</label>
    <div id="dateCards"></div>
    <input type="hidden" id="date" name="date" required />

    <label for="timeSlot">Time Slot</label>
    <select id="timeSlot" name="timeSlot" required>
      <option value="">-- Select a time --</option>
      <option value="8:00">8:00 AM</option>
      <option value="8:30">8:30 AM</option>
      <option value="9:00">9:00 AM</option>
      <option value="9:30">9:30 AM</option>
      <option value="10:00">10:00 AM</option>
      <option value="10:30">10:30 AM</option>
      <option value="11:00">11:00 AM</option>
      <option value="11:30">11:30 PM</option>
      <option value="12:00">12:00 PM</option>
      <option value="12:30">12:30 PM</option>
      <option value="13:00">1:00 PM</option>
      <option value="13:30">1:30 PM</option>
      <option value="14:00">2:00 PM</option>
      <option value="14:30">2:30 PM</option>
      <option value="15:00">3:00 PM</option>
      <option value="15:30">3:30 PM</option>
      <option value="16:00">4:00 PM</option>
      <option value="16:30">4:30 PM</option>
      <option value="17:00">5:00 PM</option>
      <option value="17:30">5:30 PM</option>
      <option value="18:00">6:00 PM</option>
      <option value="18:30">6:30 PM</option>
      <option value="19:00">7:00 PM</option>
      <option value="19:30">7:30 PM</option>
      <option value="20:00">8:00 PM</option>
      <option value="20:30">8:30 PM</option>
      <option value="21:00">9:00 PM</option>
    </select>

    <label for="people">Number of People</label>
    <select id="people" name="people" required>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option><option value="6">6</option>
      <option value="7">7</option><option value="8">8</option>
      <option value="7">9</option><option value="8">10</option>
    </select>

    <label>Select a Table</label>
    <div class="floor-plan">
      <div style="display: flex;">
        <div style="display: flex; flex-direction: column;">
        <div class="table-grid-inside" style="border:2px solid black;"> 
          <div class="area-title" style="grid-area: 1 / 1 / 2 / 2;">Inside</div>
          <div class="table" data-id="i1" style="grid-area: 3 / 1 / 8 / 2;">10</div>
          <div class="table" data-id="i2" style="grid-area: 7 / 2 / 8 / 3;">2</div>
          <div class="table" data-id="i3" style="grid-area: 6 / 2 / 7 / 3;">2</div>
          <div class="table" data-id="i4" style="grid-area: 7 / 3 / 8 / 4;">2</div>
          <div class="table" data-id="i5" style="grid-area: 1 / 3 / 2 / 5;">4</div>
          <div class="table" data-id="i6" style="grid-area: 2 / 3 / 4 / 5; ">8</div>
          <div class="table" data-id="i7" style="grid-area: 4 / 3 / 5 / 5; ">4</div>
          <div class="table" data-id="i8" style="grid-area: 5 / 4 / 6 / 5; ">2</div>
        </div>
        <div class="table-grid-inside" style="background-color: #e65a28;">
          <div class="table" data-id="o8" style="grid-area:8 / 1 / 11 / 2;">6</div>
          <div class="table" data-id="o9" style="grid-area:8 / 2 / 10 / 4;">8</div>
          <div class="table" data-id="o10" style="grid-area: 10 / 2 / 11 / 4;">4</div>
          <div class="table" data-id="o11" style="grid-area: 8 / 4 / 10 / 5;">4</div>
          <div class="table" data-id="o11" style="grid-area:10 / 4 / 11 / 5;">2</div>
          </div>
          </div>
        <div class="table-grid-inside" style="background-color: #e65a28;">
          <div class="area-title" style="grid-area: 1 / 5 / 2 / 6;">Outside</div>
          <div class="table" data-id="o1" style="grid-area: 2 / 5 / 3 / 7;">4</div>
          <div class="table" data-id="o2" style="grid-area: 1 / 6 / 2 / 7;">2</div>
          <div class="table" data-id="o3" style="grid-area:3 / 5 / 5 / 7;">8</div>
          <div class="table" data-id="o4" style="grid-area:5 / 5 / 6 / 6;">2</div>
          <div class="table" data-id="o5" style="grid-area:5 / 6 / 6 / 7;">2</div>
          <div class="table" data-id="o6" style="grid-area: 6 / 5 / 7 / 7;">4</div>
          <div class="table" data-id="o7" style="grid-area: 7 / 5 / 8 / 7;">6</div>
          <div class="table" data-id="o7" style="grid-area: 8 / 5 / 11 / 7; background-color: #e65a28;"></div>
        </div>
        </div>
      </div>
    </div>


    <input type="submit" value="Book Table" />
  </form>

  <div id="confirmationMessage" class="confirmation" style="display:none;">
    ✅ Your table has been successfully booked!
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, query, where, getDocs 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { 
    getAuth, onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCyA2J8LvC5g7AytMe-Z9JpTQXCawa7Fao",
    authDomain: "dinebridge-c997d.firebaseapp.com",
    projectId: "dinebridge-c997d",
    storageBucket: "dinebridge-c997d.appspot.com",
    messagingSenderId: "36472278990",
    appId: "1:36472278990:web:6c407e4e9bac73fd7ea59f",
    measurementId: "G-TJVBF3Y8CK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);  // 🔑 initialize auth

  const tables = document.querySelectorAll('.table');
  let selectedTable = null;
  const dateCardsContainer = document.getElementById('dateCards');
  const hiddenDateInput = document.getElementById('date');
  let currentUser = null; // 🔑 store logged-in user

  // Track logged-in user
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      console.log("Logged in as:", user.email);
    } else {
      currentUser = null;
      console.log("No user logged in");
      alert("⚠️ Please log in to book a table.");
    }
  });

  // Date cards (7 days)
  function createDateCards() {
    for (let i = 0; i < 7; i++) {
      const date = new Date();
      date.setDate(date.getDate() + i);
      const card = document.createElement('div');
      card.textContent = date.toDateString().slice(0, 10);
      card.addEventListener('click', () => {
        [...dateCardsContainer.children].forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        hiddenDateInput.value = date.toISOString().split('T')[0];
        loadReservedTables();
      });
      dateCardsContainer.appendChild(card);
    }
  }
  createDateCards();

  // Handle table selection
  tables.forEach(table => {
    table.addEventListener('click', () => {
      if (table.classList.contains('reserved')) return;
      if (selectedTable) selectedTable.classList.remove('selected');
      selectedTable = table;
      selectedTable.classList.add('selected');
    });
  });

  // Load reserved tables for selected date/time
  async function loadReservedTables() {
    const date = hiddenDateInput.value;
    const time = document.getElementById("timeSlot").value;
    if (!date || !time) return;

    const q = query(collection(db, "bookings"),
      where("date", "==", date),
      where("timeSlot", "==", time)
    );
    const snapshot = await getDocs(q);

    tables.forEach(t => t.classList.remove('reserved'));
    snapshot.forEach(doc => {
      const data = doc.data();
      const reservedTable = document.querySelector(`.table[data-id="${data.tableId}"]`);
      if (reservedTable) reservedTable.classList.add('reserved');
    });
  }

  document.getElementById("timeSlot").addEventListener("change", loadReservedTables);

  // Booking form submit
  document.getElementById("bookingForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (!currentUser) {
      alert("⚠️ Please log in before booking");
      return;
    }

    if (!selectedTable) return alert("Please select a table");
    if (!hiddenDateInput.value) return alert("Please select a date");

    const booking = {
      userId: currentUser.uid,   
      date: hiddenDateInput.value,
      timeSlot: document.getElementById("timeSlot").value,
      people: document.getElementById("people").value,
      tableId: selectedTable.dataset.id,
      createdAt: new Date()
    };

    try {
      await addDoc(collection(db, "bookings"), booking);
      document.getElementById("bookingForm").style.display = "none";
      document.getElementById("confirmationMessage").style.display = "block";
      console.log("Booking saved:", booking);
    } catch (error) {
      console.error("Error saving booking:", error);
    }
  });
</script>
